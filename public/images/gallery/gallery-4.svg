<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <pattern id="grid4" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
    </pattern>
    <linearGradient id="sunset4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="40%" stop-color="#FFC42C"/>
      <stop offset="70%" stop-color="#FF9F1C"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
  </defs>
  <!-- Sunset sky -->
  <rect width="400" height="200" fill="url(#sunset4)"/>
  <!-- Sun -->
  <rect x="160" y="60" width="80" height="80" fill="#FFC42C" rx="6"/>
